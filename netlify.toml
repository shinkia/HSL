[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Sitemap — proxy to Supabase Edge Function
[[redirects]]
  from = "/sitemap.xml"
  to = "https://zazmzusudsldkvahsxgo.supabase.co/functions/v1/sitemap"
  status = 200
  force = true

# SPA fallback — every non-asset request returns index.html so React Router can handle it
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security + caching headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    # CSP: allow self + Supabase API/storage + Google OAuth + Dicebear avatars + Tiptap inline images
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://accounts.google.com https://apis.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https://zazmzusudsldkvahsxgo.supabase.co https://api.dicebear.com https://*.googleusercontent.com; connect-src 'self' https://zazmzusudsldkvahsxgo.supabase.co wss://zazmzusudsldkvahsxgo.supabase.co https://accounts.google.com; frame-src 'self' https://accounts.google.com; object-src 'none'; base-uri 'self'; form-action 'self'"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

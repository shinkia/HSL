[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Sitemap — proxy to Supabase Edge Function
[[redirects]]
  from = "/sitemap.xml"
  to = "https://zazmzusudsldkvahsxgo.supabase.co/functions/v1/sitemap"
  status = 200
  force = true

# SPA fallback — every non-asset request returns index.html so React Router can handle it
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security + caching headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
